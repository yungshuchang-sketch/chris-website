<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WONDER FARM 神奇農場 - 專案管理工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel (用於瀏覽器內編譯 JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Marked.js (Markdown 渲染) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Google Fonts: Nunito for a playful look -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdf4; /* Light green farm background */
            background-image: 
                radial-gradient(#bbf7d0 2px, transparent 2px),
                radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
        }

        /* Custom Scrollbar for columns */
        .task-column::-webkit-scrollbar {
            width: 6px;
        }
        .task-column::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02);
            border-radius: 8px;
        }
        .task-column::-webkit-scrollbar-thumb {
            background: rgba(34, 197, 94, 0.2);
            border-radius: 8px;
        }
        .task-column::-webkit-scrollbar-thumb:hover {
            background: rgba(34, 197, 94, 0.4);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 32px rgba(34, 197, 94, 0.1);
        }

        /* 標題字型設計 */
        .farm-title {
            text-shadow: 2px 2px 0px #fff, 
                         4px 4px 0px rgba(34, 197, 94, 0.2);
            letter-spacing: -1px;
        }

        /* Cloud Animation */
        @keyframes floatCloud {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(100vw); }
        }
        .cloud {
            position: fixed;
            top: 20px;
            opacity: 0.6;
            z-index: -1;
            animation: floatCloud linear infinite;
        }
        .cloud-1 { animation-duration: 40s; top: 10%; width: 120px; }
        .cloud-2 { animation-duration: 60s; top: 30%; width: 80px; animation-delay: -20s; }

        /* Markdown 內容美化樣式 */
        .markdown-content p { margin-bottom: 0.5em; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-content ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-content li { margin-bottom: 0.2em; }
        .markdown-content strong { font-weight: 800; color: #2e7d32; }
        .markdown-content em { font-style: italic; color: #558b2f; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: bold; color: #333; margin-top: 0.8em; margin-bottom: 0.4em; }
        .markdown-content blockquote { border-left: 3px solid #a5d6a7; padding-left: 0.8em; color: #666; font-style: italic; background: #f1f8e9; padding-block: 0.2em; border-radius: 0 4px 4px 0; }
        .markdown-content a { color: #1976d2; text-decoration: underline; }
        .markdown-content code { background-color: #f1f8e9; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #e65100; border: 1px solid #c8e6c9;}

        /* 吉祥物動畫 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .mascot-bounce {
            animation: bounce 2s infinite ease-in-out;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase 模組與初始化邏輯 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 您的 Firebase Config 憑證
        const firebaseConfig = {
          apiKey: "AIzaSyDb20UwVm-JRHatklSKHrM3E_7VKAUQl4E",
          authDomain: "wonder-farm-kanban.firebaseapp.com",
          projectId: "wonder-farm-kanban",
          storageBucket: "wonder-farm-kanban.firebasestorage.app",
          messagingSenderId: "390328085886",
          appId: "1:390328085886:web:0ad2ad2645f14b16c0972f",
          measurementId: "G-99CKPDM349"
        };

        window.firebaseApp = null;
        window.firebaseDb = null;
        window.firebaseAuth = null;
        window.isFirebaseActive = false;
        window.currentUserId = null;
        window.appId = firebaseConfig.projectId; // 綁定雲端資料夾識別碼

        window.firebaseFirestore = {
            doc, setDoc, deleteDoc, onSnapshot, collection, query, addDoc, updateDoc
        };

        try {
            // 初始化 Firebase
            window.firebaseApp = initializeApp(firebaseConfig);
            window.firebaseDb = getFirestore(window.firebaseApp);
            window.firebaseAuth = getAuth(window.firebaseApp);

            // 執行匿名登入，讓網頁具備雲端存取身分
            signInAnonymously(window.firebaseAuth).then((userCredential) => {
                // 為避免匿名身分因清除瀏覽器快取改變而找不到資料，這裡推薦在協作時共用一個基礎路徑
                // 如果需要「全團隊看同一個看板」，我們在 React 的資料讀取路徑上做統一
                window.currentUserId = "shared_farm_board"; 
                window.isFirebaseActive = true;
                window.dispatchEvent(new Event('firebase-ready'));
                console.log("Firebase 雲端同步初始化成功！");
            }).catch(err => {
                console.warn("Firebase 驗證失敗，將自動降級為單機儲存模式：", err);
            });
        } catch (error) {
            console.warn("Firebase 連線錯誤，自動切換為 LocalStorage 單機儲存模式。", error);
        }
    </script>

    <!-- React 看板核心邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 初始預設排程種子（若資料庫全空時會自動播種）
        const initialTasks = [
            { id: '1', title: 'Day 1: 預告活動', content: '發布剪影圖，讓大家猜猜即將到來的神秘活動。', status: 'todo', theme: '貼文', startDate: '2026-07-01', endDate: '2026-07-01', assignee: '小幫手A' },
            { id: '2', title: 'Day 2: 揭曉主題', content: '正式公布「夏日豐收祭」活動，並預告有抽獎！', status: 'todo', theme: '貼文', startDate: '2026-07-02', endDate: '2026-07-02', assignee: '小幫手B' },
            { id: '12', title: 'Day 12: 幕後花絮', content: '展示團隊包裝福袋的辛苦（有趣）畫面。', status: 'doing', theme: '貼文', startDate: '2026-07-12', endDate: '2026-07-12', assignee: '農場主' },
            { id: '30', title: 'Day 30: 感謝與下次見', content: '發表感謝文，為夏日豐收祭畫下完美句點，敬請期待下次活動！', status: 'done', theme: '貼文', startDate: '2026-07-30', endDate: '2026-07-30', assignee: '農場主' }
        ];

        const THEMES = ['貼文', '限動', 'Reels', '活動', '知識', '互動', '故事'];

        const getEmoji = (theme) => {
            const map = {
                '貼文': '📝', '限動': '⏱️', 'Reels': '🎬',
                '活動': '🎉', '知識': '💡', '互動': '💬', '故事': '📖'
            };
            return map[theme] || '📌';
        };

        const FarmKanban = () => {
            const [tasks, setTasks] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [draggedItem, setDraggedItem] = useState(null);
            const [storageMode, setStorageMode] = useState('loading'); 
            const dbRef = useRef(null);
            
            const [viewingTask, setViewingTask] = useState(null);
            
            const [formData, setFormData] = useState({
                title: '', content: '', theme: '貼文', startDate: '', endDate: '', assignee: ''
            });

            const [mascotMessage, setMascotMessage] = useState("外頭太陽大，快進來吹冷氣排程吧哞～");
            const [showMascotMsg, setShowMascotMsg] = useState(true);

            const mascotQuotes = [
                "休息一下，喝口水吧！哞～",
                "這個專案看起來很順利喔！",
                "不要把自己逼太緊，慢慢來～",
                "今天農場的天氣真好呢！",
                "寫不出文案時，去看看草地吧！",
                "你做得很好喔！給你一個牛牛讚！",
                "記得檢查錯字喔！哞！"
            ];

            const pokeMascot = () => {
                const randomQuote = mascotQuotes[Math.floor(Math.random() * mascotQuotes.length)];
                setMascotMessage(randomQuote);
                setShowMascotMsg(true);
                setTimeout(() => setShowMascotMsg(false), 3500);
            };

            useEffect(() => {
                const initData = async () => {
                    if (window.isFirebaseActive && window.firebaseDb && window.currentUserId) {
                        setStorageMode('cloud');
                        // 建立雲端資料集路徑
                        const collectionRef = window.firebaseFirestore.collection(window.firebaseDb, 'wonder_farm_boards', window.currentUserId, 'tasks');
                        
                        dbRef.current = window.firebaseFirestore.onSnapshot(collectionRef, (snapshot) => {
                            const fetchedTasks = snapshot.docs.map(doc => ({
                                id: doc.id,
                                ...doc.data()
                            }));
                            
                            if (fetchedTasks.length === 0) {
                                // 如果雲端是空的，播下初始預設點子
                                Promise.all(initialTasks.map(task => {
                                    const { id, ...taskData } = task;
                                    return window.firebaseFirestore.addDoc(collectionRef, taskData);
                                }));
                            } else {
                                setTasks(fetchedTasks);
                            }
                        }, (error) => {
                            console.error("Firebase 監聽錯誤:", error);
                            fallbackToLocal();
                        });
                    } else {
                        fallbackToLocal();
                    }
                };

                const fallbackToLocal = () => {
                    setStorageMode('local');
                    const savedTasks = localStorage.getItem('farmKanban_tasks_v2');
                    if (savedTasks) {
                        setTasks(JSON.parse(savedTasks));
                    } else {
                        setTasks(initialTasks);
                        localStorage.setItem('farmKanban_tasks_v2', JSON.stringify(initialTasks));
                    }
                };

                if (window.isFirebaseActive) {
                    initData();
                } else {
                    const timer = setTimeout(fallbackToLocal, 2000); // 2秒沒連上就自動切本地
                    const handleReady = () => {
                        clearTimeout(timer);
                        initData();
                    };
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }

                return () => {
                    if (dbRef.current) dbRef.current();
                };
            }, []);

            useEffect(() => {
                if (storageMode === 'local' && tasks.length > 0) {
                    localStorage.setItem('farmKanban_tasks_v2', JSON.stringify(tasks));
                }
            }, [tasks, storageMode]);

            const handleSave = async (e) => {
                e.preventDefault();
                const newTask = {
                    title: formData.title,
                    content: formData.content,
                    theme: formData.theme,
                    startDate: formData.startDate,
                    endDate: formData.endDate,
                    assignee: formData.assignee,
                    status: editingTask ? editingTask.status : 'todo'
                };

                if (storageMode === 'cloud') {
                    const collectionRef = window.firebaseFirestore.collection(window.firebaseDb, 'wonder_farm_boards', window.currentUserId, 'tasks');
                    if (editingTask) {
                        const docRef = window.firebaseFirestore.doc(window.firebaseDb, 'wonder_farm_boards', window.currentUserId, 'tasks', editingTask.id);
                        await window.firebaseFirestore.updateDoc(docRef, newTask);
                    } else {
                        await window.firebaseFirestore.addDoc(collectionRef, newTask);
                    }
                } else {
                    if (editingTask) {
                        setTasks(tasks.map(t => t.id === editingTask.id ? { ...t, ...newTask } : t));
                    } else {
                        setTasks([...tasks, { ...newTask, id: Date.now().toString() }]);
                    }
                }
                closeModal();
            };

            const handleDelete = async (id) => {
                if (storageMode === 'cloud') {
                    const docRef = window.firebaseFirestore.doc(window.firebaseDb, 'wonder_farm_boards', window.currentUserId, 'tasks', id);
                    await window.firebaseFirestore.deleteDoc(docRef);
                } else {
                    setTasks(tasks.filter(t => t.id !== id));
                }
                closeModal();
            };

            const handleDragStart = (e, task) => {
                setDraggedItem(task);
                e.dataTransfer.effectAllowed = "move";
                e.target.style.opacity = '0.5';
            };

            const handleDragEnd = (e) => {
                e.target.style.opacity = '1';
                setDraggedItem(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
            };

            const handleDrop = async (e, status) => {
                e.preventDefault();
                if (!draggedItem || draggedItem.status === status) return;

                if (storageMode === 'cloud') {
                     const docRef = window.firebaseFirestore.doc(window.firebaseDb, 'wonder_farm_boards', window.currentUserId, 'tasks', draggedItem.id);
                     await window.firebaseFirestore.updateDoc(docRef, { status: status });
                } else {
                    setTasks(tasks.map(task => 
                        task.id === draggedItem.id ? { ...task, status } : task
                    ));
                }
            };

            const openModal = (task = null) => {
                if (task) {
                    setEditingTask(task);
                    setFormData({
                        title: task.title, content: task.content, theme: task.theme || '貼文',
                        startDate: task.startDate || '', endDate: task.endDate || '', assignee: task.assignee || ''
                    });
                } else {
                    setEditingTask(null);
                    setFormData({ title: '', content: '', theme: '貼文', startDate: '', endDate: '', assignee: '' });
                }
                setIsModalOpen(true);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingTask(null);
            };

            const exportCSV = () => {
                const headers = ['標題', '內容', '標籤', '開始日期', '結束日期', '負責人', '狀態'];
                const csvRows = tasks.map(task => [
                    `"${(task.title || '').replace(/"/g, '""')}"`,
                    `"${(task.content || '').replace(/"/g, '""')}"`,
                    `"${task.theme || ''}"`,
                    `"${task.startDate || ''}"`,
                    `"${task.endDate || ''}"`,
                    `"${task.assignee || ''}"`,
                    `"${task.status || 'todo'}"`
                ].join(','));
                
                const csvString = [headers.join(','), ...csvRows].join('\n');
                const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `神奇農場排程_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

            const handleFileUpload = async (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const rows = text.split('\n');
                    const newTasks = [];
                    for(let i=1; i<rows.length; i++){
                        const row = rows[i].trim();
                        if(!row) continue;
                        const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                        if(cols && cols.length >= 2){
                            const cleanCol = (str) => str ? str.replace(/^"|"$/g, '').replace(/""/g, '"') : '';
                            newTasks.push({
                                title: cleanCol(cols[0]),
                                content: cleanCol(cols[1]),
                                theme: cleanCol(cols[2]) || '貼文',
                                startDate: cleanCol(cols[3]) || '',
                                endDate: cleanCol(cols[4]) || '',
                                assignee: cleanCol(cols[5]) || '',
                                status: cleanCol(cols[6]) || 'todo'
                            });
                        }
                    }

                    if(newTasks.length > 0){
                        if(storageMode === 'cloud'){
                            const collectionRef = window.firebaseFirestore.collection(window.firebaseDb, 'wonder_farm_boards', window.currentUserId, 'tasks');
                            for(const task of newTasks){
                                await window.firebaseFirestore.addDoc(collectionRef, task);
                            }
                        } else {
                            const tasksWithIds = newTasks.map((t, index) => ({...t, id: `csv_${Date.now()}_${index}`}));
                            setTasks([...tasks, ...tasksWithIds]);
                        }
                        alert(`成功匯入 ${newTasks.length} 筆排程！`);
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const TaskCard = ({ task }) => {
                return (
                    <div 
                        draggable 
                        onDragStart={(e) => handleDragStart(e, task)}
                        onDragEnd={handleDragEnd}
                        onClick={() => setViewingTask(task)}
                        className="bg-white p-4 rounded-2xl shadow-sm border-2 border-transparent hover:border-green-300 hover:shadow-md transition-all cursor-pointer group relative mb-3"
                    >
                        <div className="flex justify-between items-start mb-2">
                            <span className="text-emerald-800 font-extrabold text-lg">{task.title}</span>
                            <button 
                                onClick={(e) => { 
                                    e.stopPropagation(); 
                                    openModal(task); 
                                }}
                                className="text-gray-400 hover:text-emerald-600 opacity-0 group-hover:opacity-100 transition-opacity p-1 bg-green-50 rounded-lg relative z-10"
                                title="編輯點子"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>
                            </button>
                        </div>
                        
                        <div className="flex flex-wrap gap-1.5 mb-2">
                            <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-bold bg-amber-100 text-amber-800">
                                <span>{getEmoji(task.theme)}</span> {task.theme}
                            </span>
                            {task.assignee && (
                                <span className="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-bold bg-purple-100 text-purple-800">
                                    {task.assignee}
                                </span>
                            )}
                        </div>

                        {(task.startDate || task.endDate) && (
                            <div className="flex items-center gap-1 text-xs font-bold text-gray-400 bg-gray-50 px-2 py-1 rounded-lg mb-2 w-max">
                                <span>⏱️ {task.startDate || '未定'} ~ {task.endDate || '未定'}</span>
                            </div>
                        )}

                        <div 
                            className="text-gray-500 text-sm markdown-content line-clamp-3"
                            dangerouslySetInnerHTML={{ 
                                __html: marked.parse(task.content || '', { breaks: true, gfm: true }) 
                            }}
                        />
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative overflow-hidden pb-20">
                    {/* Background Clouds */}
                    <svg className="cloud cloud-1 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 19c-2.485 0-4.5-2.015-4.5-4.5 0-1.07.37-2.05.98-2.82C13.29 10.74 12.21 10 11 10c-1.895 0-3.48 1.34-3.89 3.14C6.67 12.8 6.1 12.5 5.5 12.5 3.565 12.5 2 14.065 2 16s1.565 3.5 3.5 3.5h12c2.21 0 4-1.79 4-4s-1.79-4-4-4c-.755 0-1.46.21-2.07.57.04-.35.07-.7.07-1.07 0-1.82-1.2-3.35-2.87-3.81z"/></svg>
                    <svg className="cloud cloud-2 text-white" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 19c-2.485 0-4.5-2.015-4.5-4.5 0-1.07.37-2.05.98-2.82C13.29 10.74 12.21 10 11 10c-1.895 0-3.48 1.34-3.89 3.14C6.67 12.8 6.1 12.5 5.5 12.5 3.565 12.5 2 14.065 2 16s1.565 3.5 3.5 3.5h12c2.21 0 4-1.79 4-4s-1.79-4-4-4c-.755 0-1.46.21-2.07.57.04-.35.07-.7.07-1.07 0-1.82-1.2-3.35-2.87-3.81z"/></svg>

                    <div className="max-w-7xl mx-auto px-4 py-8">
                        {/* Header */}
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 bg-white/70 p-5 rounded-3xl backdrop-blur-md border-4 border-white shadow-sm gap-4">
                            <div className="flex items-center gap-4">
                                <div className="h-16 w-36 rounded-2xl bg-gradient-to-br from-amber-400 to-orange-500 flex items-center justify-center border-2 border-white shadow-inner shadow-black/10">
                                   <div className="font-black text-xl text-white tracking-wider text-center leading-none">
                                        <span>WONDER</span><br/>
                                        <span className="text-xs opacity-90">FARM</span>
                                   </div>
                                </div>
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-black text-emerald-800 farm-title">
                                         神奇農場 IG 排程管理
                                    </h1>
                                    <div className="flex items-center gap-2 mt-1 text-sm font-bold">
                                        <span className={`inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs ${storageMode === 'cloud' ? 'bg-emerald-100 text-emerald-700' : storageMode === 'local' ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-500'}`}>
                                            ● {storageMode === 'cloud' ? '雲端同步中' : storageMode === 'local' ? '單機儲存模式' : '同步連線中...'}
                                        </span>
                                    </div>
                                </div>
                            </div>
                            
                            {/* 工具按鈕區 */}
                            <div className="flex flex-wrap items-center gap-3">
                                <label className="cursor-pointer bg-white hover:bg-gray-50 border-2 border-gray-200 px-4 py-2 rounded-xl text-sm font-bold text-gray-600 transition-colors shadow-sm flex items-center gap-1.5">
                                    <span>📥 匯入 CSV</span>
                                    <input type="file" accept=".csv" onChange={handleFileUpload} className="hidden" />
                                </label>
                                <button onClick={exportCSV} className="bg-white hover:bg-gray-50 border-2 border-gray-200 px-4 py-2 rounded-xl text-sm font-bold text-gray-600 transition-colors shadow-sm flex items-center gap-1.5">
                                    <span>📤 匯出 CSV</span>
                                </button>
                                <button onClick={() => openModal()} className="bg-emerald-500 hover:bg-emerald-600 px-5 py-2.5 rounded-xl text-sm font-black text-white transition-all transform hover:scale-[1.03] shadow-md flex items-center gap-1">
                                    <span>＋ 新增排程</span>
                                </button>
                            </div>
                        </div>

                        {/* 吉祥物提示區 */}
                        {showMascotMsg && (
                            <div className="mb-6 flex items-center gap-3 bg-emerald-50/80 backdrop-blur-sm border-2 border-emerald-200 p-3.5 rounded-2xl max-w-xl mx-auto shadow-sm animate-fade-in">
                                <div onClick={pokeMascot} className="text-3xl cursor-pointer mascot-bounce select-none" title="點我聊天">🐮</div>
                                <div className="text-emerald-900 font-bold text-sm bg-white px-3 py-1.5 rounded-xl border border-emerald-100 relative shadow-sm w-full">
                                    {mascotMessage}
                                </div>
                            </div>
                        )}

                        {/* Kanban Board */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {/* 待辦欄位 */}
                            <div 
                                onDragOver={handleDragOver} 
                                onDrop={(e) => handleDrop(e, 'todo')}
                                className="glass-panel p-4 rounded-3xl min-h-[600px] flex flex-col"
                            >
                                <div className="flex justify-between items-center mb-4 px-1">
                                    <h3 className="font-black text-lg text-gray-700 flex items-center gap-2">🌱 準備中耕耘</h3>
                                    <span className="bg-gray-200/80 text-gray-700 font-extrabold text-xs px-2.5 py-1 rounded-full">
                                        {tasks.filter(t => t.status === 'todo').length}
                                    </span>
                                </div>
                                <div className="task-column flex-1 overflow-y-auto max-h-[550px] pr-1">
                                    {tasks.filter(t => t.status === 'todo').map(task => <TaskCard key={task.id} task={task} />)}
                                </div>
                            </div>

                            {/* 執行中欄位 */}
                            <div 
                                onDragOver={handleDragOver} 
                                onDrop={(e) => handleDrop(e, 'doing')}
                                className="glass-panel p-4 rounded-3xl min-h-[600px] flex flex-col"
                            >
                                <div className="flex justify-between items-center mb-4 px-1">
                                    <h3 className="font-black text-lg text-amber-800 flex items-center gap-2">☀️ 正在灌溉發芽</h3>
                                    <span className="bg-amber-100 text-amber-800 font-extrabold text-xs px-2.5 py-1 rounded-full">
                                        {tasks.filter(t => t.status === 'doing').length}
                                    </span>
                                </div>
                                <div className="task-column flex-1 overflow-y-auto max-h-[550px] pr-1">
                                    {tasks.filter(t => t.status === 'doing').map(task => <TaskCard key={task.id} task={task} />)}
                                </div>
                            </div>

                            {/* 已完成欄位 */}
                            <div 
                                onDragOver={handleDragOver} 
                                onDrop={(e) => handleDrop(e, 'done')}
                                className="glass-panel p-4 rounded-3xl min-h-[600px] flex flex-col"
                            >
                                <div className="flex justify-between items-center mb-4 px-1">
                                    <h3 className="font-black text-lg text-emerald-800 flex items-center gap-2">🍎 豐收果實上傳</h3>
                                    <span className="bg-emerald-100 text-emerald-800 font-extrabold text-xs px-2.5 py-1 rounded-full">
                                        {tasks.filter(t => t.status === 'done').length}
                                    </span>
                                </div>
                                <div className="task-column flex-1 overflow-y-auto max-h-[550px] pr-1">
                                    {tasks.filter(t => t.status === 'done').map(task => <TaskCard key={task.id} task={task} />)}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Modal: 新增 / 編輯視窗 */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-xl border-4 border-emerald-50 max-w-lg w-full max-h-[90vh] overflow-y-auto p-6">
                                <h3 className="text-xl font-black text-emerald-900 mb-4 flex items-center gap-1.5">
                                    {editingTask ? '📝 編輯發文點子' : '✨ 播下新點子種子'}
                                </h3>
                                <form onSubmit={handleSave} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-black text-gray-600 mb-1">排程標題</label>
                                        <input 
                                            type="text" required placeholder="例如：Day 11 農產小知識"
                                            value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})}
                                            className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl font-bold focus:border-emerald-500 outline-none"
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-sm font-black text-gray-600 mb-1">主題類型</label>
                                            <select 
                                                value={formData.theme} onChange={e => setFormData({...formData, theme: e.target.value})}
                                                className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl font-bold bg-white focus:border-emerald-500 outline-none"
                                            >
                                                {THEMES.map(t => <option key={t} value={t}>{getEmoji(t)} {t}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-black text-gray-600 mb-1">負責小幫手</label>
                                            <input 
                                                type="text" placeholder="負責人姓名"
                                                value={formData.assignee} onChange={e => setFormData({...formData, assignee: e.target.value})}
                                                className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl font-bold focus:border-emerald-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-sm font-black text-gray-600 mb-1">預計開始日</label>
                                            <input 
                                                type="date" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})}
                                                className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl font-bold focus:border-emerald-500 outline-none"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-black text-gray-600 mb-1">預計結束日</label>
                                            <input 
                                                type="date" value={formData.endDate} onChange={e => setFormData({...formData, endDate: e.target.value})}
                                                className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl font-bold focus:border-emerald-500 outline-none"
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-black text-gray-600 mb-1">內容與文案撰寫 (支援 Markdown)</label>
                                        <textarea 
                                            rows="5" placeholder="輸入圖文架構、Hashtags 或排程細節..."
                                            value={formData.content} onChange={e => setFormData({...formData, content: e.target.value})}
                                            className="w-full px-3 py-2 border-2 border-gray-200 rounded-xl font-bold focus:border-emerald-500 outline-none font-mono text-sm"
                                        ></textarea>
                                    </div>
                                    
                                    <div className="flex justify-between items-center pt-2 border-t border-gray-100">
                                        {editingTask ? (
                                            <button 
                                                type="button" onClick={() => { if(confirm('確定要拔除這顆點子種子嗎？')) handleDelete(editingTask.id); }}
                                                className="px-4 py-2 rounded-xl text-sm font-bold text-red-500 hover:bg-red-50 transition-colors"
                                            >
                                                🗑️ 刪除點子
                                            </button>
                                        ) : <div/>}
                                        <div className="flex gap-2">
                                            <button 
                                                type="button" onClick={closeModal}
                                                className="px-4 py-2 border-2 border-gray-200 rounded-xl text-sm font-bold text-gray-500 hover:bg-gray-50"
                                            >
                                                取消
                                            </button>
                                            <button 
                                                type="submit"
                                                className="px-5 py-2 bg-emerald-500 hover:bg-emerald-600 text-white font-black rounded-xl text-sm shadow-md"
                                            >
                                                儲存至農場
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal: 瀏覽詳細資料視窗 */}
                    {viewingTask && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setViewingTask(null)}>
                            <div className="bg-white rounded-3xl shadow-xl border-4 border-emerald-50 max-w-xl w-full p-6" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-start mb-3">
                                    <div>
                                        <span className="text-xs font-black text-emerald-600 tracking-wider block mb-0.5">WONDER FARM 排程詳情</span>
                                        <h2 className="text-2xl font-black text-gray-800">{viewingTask.title}</h2>
                                    </div>
                                    <div className="flex gap-1.5">
                                        <button 
                                            onClick={() => { setViewingTask(null); openModal(viewingTask); }}
                                            className="p-2 text-emerald-600 hover:bg-emerald-50 rounded-xl transition-colors font-bold text-sm flex items-center gap-1"
                                        >
                                            ✏️ 編輯
                                        </button>
                                        <button onClick={() => setViewingTask(null)} className="p-2 text-gray-400 hover:text-gray-600 rounded-xl font-bold">✕</button>
                                    </div>
                                </div>

                                <div className="flex flex-wrap gap-2 mb-4 bg-gray-50 p-2.5 rounded-2xl border border-gray-100">
                                    <div className="text-xs font-bold text-gray-500"><span className="text-gray-400 font-medium">類型：</span>{getEmoji(viewingTask.theme)} {viewingTask.theme}</div>
                                    <div className="text-xs font-bold text-gray-500"><span className="text-gray-400 font-medium">小幫手：</span>{viewingTask.assignee || '未指派'}</div>
                                    <div className="text-xs font-bold text-gray-500"><span className="text-gray-400 font-medium">進度：</span>{viewingTask.status === 'todo' ? '準備中' : viewingTask.status === 'doing' ? '執行中' : '已完成'}</div>
                                    <div className="text-xs font-bold text-gray-500 w-full"><span className="text-gray-400 font-medium">期間：</span>{viewingTask.startDate || '未定'} ～ {viewingTask.endDate || '未定'}</div>
                                </div>

                                <div className="border-t border-gray-100 pt-4">
                                    <h4 className="text-xs font-black text-emerald-800/60 mb-2 tracking-wide uppercase">📋 詳細內文企劃</h4>
                                    <div 
                                        className="text-gray-600 text-sm bg-stone-50/50 p-4 rounded-2xl border border-stone-100 overflow-y-auto max-h-[40vh] markdown-content"
                                        dangerouslySetInnerHTML={{ 
                                            __html: marked.parse(viewingTask.content || '*無詳細內容*', { breaks: true, gfm: true }) 
                                        }}
                                    />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FarmKanban />);
    </script>
</body>
</html>
