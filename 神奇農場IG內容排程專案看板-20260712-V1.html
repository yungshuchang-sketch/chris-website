    <style>
        body {
            font-family: 'Nunito', 'Microsoft JhengHei', sans-serif;
            background-color: #f0fdf4; /* Light green farm background */
            background-image: 
                radial-gradient(#bbf7d0 2px, transparent 2px),
                radial-gradient(#bbf7d0 2px, transparent 2px);

            background-position: 0 0, 20px 20px;
        }

        /* Custom Scrollbar for columns */
        .task-column::-webkit-scrollbar {
            width: 6px;
        }
        .task-column::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.02);
            border-radius: 8px;

            border-radius: 8px;

            backdrop-filter: blur(12px);

        .farm-title {
            text-shadow: 2px 2px 0px #fff, 
                         4px 4px 0px rgba(34, 197, 94, 0.2);
            letter-spacing: -1px;
        }

        /* Cloud Animation */
        @keyframes floatCloud {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(100vw); }
        }
        .cloud {
            position: fixed;
            top: 20px;
            opacity: 0.6;
            z-index: -1;
            animation: floatCloud linear infinite;
        }
        .cloud-1 { animation-duration: 40s; top: 10%; width: 120px; }
        .cloud-2 { animation-duration: 60s; top: 30%; width: 80px; animation-delay: -20s; }
        .cloud-3 { animation-duration: 50s; top: 20%; width: 150px; animation-delay: -10s; }

        /* Markdown 內容美化樣式 */
        .markdown-content p { margin-bottom: 0.5em; }
        .markdown-content p:last-child { margin-bottom: 0; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-content ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 0.5em; }
        .markdown-content li { margin-bottom: 0.2em; }
        .markdown-content strong { font-weight: 800; color: #2e7d32; }
        .markdown-content em { font-style: italic; color: #558b2f; }
        .markdown-content h1, .markdown-content h2, .markdown-content h3 { font-weight: bold; color: #333; margin-top: 0.8em; margin-bottom: 0.4em; }
        .markdown-content blockquote { border-left: 3px solid #a5d6a7; padding-left: 0.8em; color: #666; font-style: italic; background: #f1f8e9; padding-block: 0.2em; border-radius: 0 4px 4px 0; }
        .markdown-content a { color: #1976d2; text-decoration: underline; }
        .markdown-content code { background-color: #f1f8e9; padding: 2px 4px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #e65100; border: 1px solid #c8e6c9;}

        /* 吉祥物動畫 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .mascot-bounce {
            animation: bounce 2s infinite ease-in-out;
        }
        .mascot-tooltip {
            opacity: 0;
            transform: translateY(10px) scale(0.9);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            pointer-events: none;
        }
        .mascot-container:hover .mascot-tooltip,
        .mascot-tooltip.show-tooltip {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, onSnapshot, collection, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseApp = null;
        window.firebaseDb = null;
        window.firebaseAuth = null;
        window.isFirebaseActive = false;
        window.currentUserId = null;

        // 將 Firestore 方法暴露到全域，讓 React 可以呼叫
        window.firebaseFirestore = {
            doc, setDoc, deleteDoc, onSnapshot, collection, query, addDoc, updateDoc
        };

        // 嘗試初始化 Firebase (只在網頁環境下有金鑰時生效)
        try {
            const appId = typeof __app_id !== 'undefined' ? __app_id : null;
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            const initialToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

            if (appId && firebaseConfig) {
                window.firebaseApp = initializeApp(firebaseConfig);
                window.firebaseDb = getFirestore(window.firebaseApp);
                window.firebaseAuth = getAuth(window.firebaseApp);
                window.appId = appId;

                const authPromise = initialToken 
                    ? signInWithCustomToken(window.firebaseAuth, initialToken)
                    : signInAnonymously(window.firebaseAuth);

                authPromise.then((userCredential) => {
                    window.currentUserId = userCredential.user.uid;
                    window.isFirebaseActive = true;
                    // 通知 React App Firebase 已準備就緒
                    window.dispatchEvent(new Event('firebase-ready'));
                    console.log("Firebase initialized successfully.");
                }).catch(err => {
                    console.warn("Firebase auth failed, fallback to LocalStorage", err);
                });
            } else {
                console.log("No Firebase config found, defaulting to LocalStorage mode.");
            }
        } catch (error) {
            console.warn("Firebase setup error, using LocalStorage.", error);
        }
    </script>

            { id: '30', title: 'Day 30: 感謝與下次見', content: '發表感謝文，為夏日豐收祭畫下完美句點，敬請期待下次活動！', status: 'todo', theme: '貼文', startDate: '2026-07-30', endDate: '2026-07-30', assignee: '農場主' }

        const THEMES = ['貼文', '限動', 'Reels', '活動', '知識', '互動', '故事'];

        const getEmoji = (theme) => {
            const map = {
                '貼文': '📝', '限動': '⏱️', 'Reels': '🎬',
                '活動': '🎉', '知識': '💡', '互動': '💬', '故事': '📖'
            };
            return map[theme] || '📌';
        };

        const FarmKanban = () => {
            const [tasks, setTasks] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [draggedItem, setDraggedItem] = useState(null);
            const [storageMode, setStorageMode] = useState('loading'); // 'cloud', 'local', 'loading'
            const dbRef = useRef(null);
            
            // 新增：用來記錄目前正在「瀏覽」的任務
            const [viewingTask, setViewingTask] = useState(null);
            
            const [formData, setFormData] = useState({
                title: '',
                content: '',
                theme: '貼文',
                startDate: '',
                endDate: '',
                assignee: ''
            });

            // 吉祥物語錄
            const [mascotMessage, setMascotMessage] = useState("嗨！我是毛毛牛，今天也要開心排程喔哞～");
            const [showMascotMsg, setShowMascotMsg] = useState(false);

            const mascotQuotes = [
                "休息一下，喝口水吧！哞～",
                "這個專案看起來很順利喔！",
                "不要把自己逼太緊，慢慢來～",
                "今天農場的天氣真好呢！",
                "寫不出文案時，去看看草地吧！",
                "你做得很好喔！給你一個牛牛讚！",
                "記得檢查錯字喔！哞！"
            ];

            const pokeMascot = () => {
                const randomQuote = mascotQuotes[Math.floor(Math.random() * mascotQuotes.length)];
                setMascotMessage(randomQuote);
                setShowMascotMsg(true);
                setTimeout(() => setShowMascotMsg(false), 3000); // 3秒後隱藏
            };

            useEffect(() => {
                const initData = async () => {
                    if (window.isFirebaseActive && window.firebaseDb && window.currentUserId) {
                        setStorageMode('cloud');
                        // 設定 Firebase 監聽
                        const collectionRef = window.firebaseFirestore.collection(window.firebaseDb, 'artifacts', window.appId, 'users', window.currentUserId, 'tasks');
                        
                        dbRef.current = window.firebaseFirestore.onSnapshot(collectionRef, (snapshot) => {
                            const fetchedTasks = snapshot.docs.map(doc => ({
                                id: doc.id,
                                ...doc.data()
                            }));
                            
                            if (fetchedTasks.length === 0) {
                                // 首次雲端載入，寫入預設資料
                                Promise.all(initialTasks.map(task => {
                                    const { id, ...taskData } = task; // firebase 自動產生 ID
                                    return window.firebaseFirestore.addDoc(collectionRef, taskData);
                                }));
                            } else {
                                setTasks(fetchedTasks);
                            }
                        }, (error) => {
                            console.error("Firebase listen error:", error);
                            fallbackToLocal();
                        });

                    } else {
                        fallbackToLocal();
                    }
                };

                const fallbackToLocal = () => {
                    setStorageMode('local');
                    const savedTasks = localStorage.getItem('farmKanban_tasks_v2');
                    if (savedTasks) {
                        setTasks(JSON.parse(savedTasks));
                    } else {
                        setTasks(initialTasks);
                        localStorage.setItem('farmKanban_tasks_v2', JSON.stringify(initialTasks));
                    }
                };

                // 等待一下看 firebase-ready 事件是否會觸發
                if (window.isFirebaseActive) {
                    initData();
                } else {
                    const timer = setTimeout(fallbackToLocal, 1500); // 1.5秒沒連上就算單機
                    const handleReady = () => {
                        clearTimeout(timer);
                        initData();
                    };
                    window.addEventListener('firebase-ready', handleReady);
                    return () => window.removeEventListener('firebase-ready', handleReady);
                }

                return () => {
                    if (dbRef.current) dbRef.current(); // 取消監聽
                };
            }, []);

            // LocalStorage 自動存檔機制 (僅在 local 模式下觸發)
            useEffect(() => {
                if (storageMode === 'local' && tasks.length > 0) {
                    localStorage.setItem('farmKanban_tasks_v2', JSON.stringify(tasks));
                }
            }, [tasks, storageMode]);

            const handleSave = async (e) => {
                e.preventDefault();
                const newTask = {
                    title: formData.title,
                    content: formData.content,
                    theme: formData.theme,
                    startDate: formData.startDate,
                    endDate: formData.endDate,
                    assignee: formData.assignee,
                    status: editingTask ? editingTask.status : 'todo'
                };

                if (storageMode === 'cloud') {
                    const collectionRef = window.firebaseFirestore.collection(window.firebaseDb, 'artifacts', window.appId, 'users', window.currentUserId, 'tasks');
                    if (editingTask) {
                        const docRef = window.firebaseFirestore.doc(window.firebaseDb, 'artifacts', window.appId, 'users', window.currentUserId, 'tasks', editingTask.id);
                        await window.firebaseFirestore.updateDoc(docRef, newTask);
                    } else {
                        await window.firebaseFirestore.addDoc(collectionRef, newTask);
                    }
                } else {
                    // LocalStorage 模式
                    if (editingTask) {
                        setTasks(tasks.map(t => t.id === editingTask.id ? { ...t, ...newTask } : t));
                    } else {
                        setTasks([...tasks, { ...newTask, id: Date.now().toString() }]);
                    }
                }
                
                closeModal();
            };

            const handleDelete = async (id) => {
                if (storageMode === 'cloud') {
                    const docRef = window.firebaseFirestore.doc(window.firebaseDb, 'artifacts', window.appId, 'users', window.currentUserId, 'tasks', id);
                    await window.firebaseFirestore.deleteDoc(docRef);
                } else {
                    setTasks(tasks.filter(t => t.id !== id));
                }
                closeModal();
            };

            const handleDragStart = (e, task) => {
                setDraggedItem(task);
                e.dataTransfer.effectAllowed = "move";
                e.target.style.opacity = '0.5';
            };

            const handleDragEnd = (e) => {
                e.target.style.opacity = '1';
                setDraggedItem(null);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "move";
            };

            const handleDrop = async (e, status) => {
                e.preventDefault();
                if (!draggedItem || draggedItem.status === status) return;

                if (storageMode === 'cloud') {
                     const docRef = window.firebaseFirestore.doc(window.firebaseDb, 'artifacts', window.appId, 'users', window.currentUserId, 'tasks', draggedItem.id);
                     await window.firebaseFirestore.updateDoc(docRef, { status: status });
                } else {
                    setTasks(tasks.map(task => 
                        task.id === draggedItem.id ? { ...task, status } : task
                    ));
                }
            };

            const openModal = (task = null) => {
                if (task) {
                    setEditingTask(task);
                    setFormData({
                        title: task.title,
                        content: task.content,
                        theme: task.theme || '貼文',
                        startDate: task.startDate || '',
                        endDate: task.endDate || '',
                        assignee: task.assignee || ''
                    });
                } else {
                    setEditingTask(null);

                // 定義 CSV 標頭
                const headers = ['標題', '內容', '標籤', '開始日期', '結束日期', '負責人', '狀態(todo/doing/done)'];
                // 將資料轉換為 CSV 格式字串，使用雙引號包裝避免內容有逗號影響格式
                const csvRows = tasks.map(task => [
                    `"${(task.title || '').replace(/"/g, '""')}"`,
                    `"${(task.content || '').replace(/"/g, '""')}"`,
                    `"${task.theme || ''}"`,
                    `"${task.startDate || ''}"`,
                    `"${task.endDate || ''}"`,
                    `"${task.assignee || ''}"`,
                    `"${task.status || 'todo'}"`
                ].join(','));
                
                const csvString = [headers.join(','), ...csvRows].join('\n');
                
                // 加入 BOM 讓 Excel 能夠正確讀取 UTF-8
                const blob = new Blob(['\uFEFF' + csvString], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `神奇農場排程_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
            };

                const file = event.target.files[0];

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const text = e.target.result;
                    const rows = text.split('\n');
                    // 略過第一行標題
                    const newTasks = [];
                    for(let i=1; i<rows.length; i++){
                        const row = rows[i].trim();
                        if(!row) continue;
                        
                        // 簡易 CSV 解析 (處理包含引號的欄位)
                        const cols = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                        if(cols && cols.length >= 2){
                            const cleanCol = (str) => str ? str.replace(/^"|"$/g, '').replace(/""/g, '"') : '';
                            newTasks.push({
                                title: cleanCol(cols[0]),
                                content: cleanCol(cols[1]),
                                theme: cleanCol(cols[2]) || '貼文',
                                startDate: cleanCol(cols[3]) || '',
                                endDate: cleanCol(cols[4]) || '',
                                assignee: cleanCol(cols[5]) || '',
                                status: cleanCol(cols[6]) || 'todo'
                            });
                        }

                            // 批次寫入 Firebase
                            const collectionRef = window.firebaseFirestore.collection(window.firebaseDb, 'artifacts', window.appId, 'users', window.currentUserId, 'tasks');
                            for(const task of newTasks){
                                await window.firebaseFirestore.addDoc(collectionRef, task);
                            }
                        } else {
                            // Local 模式
                            const tasksWithIds = newTasks.map((t, index) => ({...t, id: `csv_${Date.now()}_${index}`}));
                            setTasks([...tasks, ...tasksWithIds]);
                        }
                        alert(`成功匯入 ${newTasks.length} 筆資料！`);

                                                value={formData.startDate}
                                                onChange={(e) => setFormData({...formData, startDate: e.target.value})}
                                                className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-[#81c784] focus:outline-none transition-colors text-gray-700"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">結束日期</label>
                                            <input 
                                                type="date"
                                                value={formData.endDate}
                                                onChange={(e) => setFormData({...formData, endDate: e.target.value})}
                                                className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-[#81c784] focus:outline-none transition-colors text-gray-700"
                                            />
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">標籤分類</label>
                                            <select 
                                                value={formData.theme}
                                                onChange={(e) => setFormData({...formData, theme: e.target.value})}
                                                className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-[#81c784] focus:outline-none transition-colors bg-white font-bold text-gray-700"
                                            >
                                                {THEMES.map(t => <option key={t} value={t}>{getEmoji(t)} {t}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-bold text-gray-700 mb-1">負責人 (選填)</label>
                                            <input 
                                                type="text" 
                                                value={formData.assignee}
                                                onChange={(e) => setFormData({...formData, assignee: e.target.value})}
                                                placeholder="例如：農場主、扭扭猴"
                                                className="w-full px-4 py-2.5 rounded-xl border-2 border-gray-200 focus:border-purple-400 focus:outline-none transition-colors font-bold text-gray-700"
                                            />
                                        </div>
                                    </div>

                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">內容描述</label>
                                        <textarea 
                                            required
                                            rows="5"
                                            value={formData.content}
                                            onChange={(e) => setFormData({...formData, content: e.target.value})}
                                            placeholder="描述要發布的內容... 支援 Markdown 語法喔！"
                                            className="w-full px-4 py-2 rounded-xl border-2 border-gray-200 focus:border-[#81c784] focus:outline-none transition-colors resize-y min-h-[120px]"
                                        ></textarea>
                                        <div className="text-xs text-gray-500 mt-1">
                                            ✨ 支援 Markdown，例如：**粗體**, - 列表, ### 標題
                                        </div>
                                    </div>

                                    <div className="flex justify-between items-center pt-4 mt-4 border-t-2 border-gray-100">
                                        {editingTask ? (
                                            <button 
                                                type="button"
                                                onClick={() => handleDelete(editingTask.id)}
                                                className="text-red-500 hover:bg-red-50 px-4 py-2 rounded-xl font-bold transition-colors flex items-center gap-1"
                                            >
                                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                                刪除
                                            </button>
                                        ) : <div></div>}
                                        
                                        <div className="flex gap-3">
                                            <button 
                                                type="button"
                                                onClick={closeModal}
                                                className="px-6 py-2.5 rounded-xl font-bold text-gray-600 hover:bg-gray-100 transition-colors"
                                            >
                                                取消
                                            </button>
                                            <button 
                                                type="submit"
                                                className="bg-[#4caf50] text-white px-8 py-2.5 rounded-xl font-black hover:bg-[#43a047] shadow-md transition-transform transform hover:-translate-y-0.5"
                                            >
                                                儲存
                                            </button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FarmKanban />);
    </script>
</body>
</html>
